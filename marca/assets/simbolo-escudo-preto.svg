<?xml version="1.0" encoding="UTF-8"?>
<!--
  O Guardiao Sobrio — Simbolo Escudo v5 (versao escura / modo acolhimento)
  viewBox: 0 0 100 100

  Mesma geometria v5: proporcoes aureas, ogiva suave, cantos r=5.
  Fundo: transparente — para sobreposicao em fundos claros.
  Cor: #1A1917 (Fundo Terciario da marca — escuro quente, nao preto puro).

  NOTA: Manual de marca define fundo claro como #F5F3EF (Fundo Limpo).
  Esta versao deve ser usada sobre #F5F3EF ou qualquer fundo claro da paleta.
  Uso: documentos impressos, modo acolhimento, apresentacoes em fundo claro.

  USO: fundo transparente, escudo #1A1917 — sobre fundos claros (#F5F3EF)
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 100 100"
     width="100" height="100"
     role="img"
     aria-label="O Guardiao Sobrio — Simbolo Escudo (escuro)">

  <!-- Sem fundo — transparente por design -->

  <path
    d="M 27,5 L 73,5 Q 78,5 78,10 L 78,61 Q 78,82 50,95 Q 22,82 22,61 L 22,10 Q 22,5 27,5 Z"
    fill="#1A1917"
    stroke="none"
  />

</svg>
