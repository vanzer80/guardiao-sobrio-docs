<?xml version="1.0" encoding="UTF-8"?>
<!--
  O Guardiao Sobrio — Simbolo Escudo (versao branca)
  viewBox: 0 0 100 100

  Mesma geometria da versao ouro: moldura (evenodd) + anel r=16 + eixo vertical.
  Fundo: transparente — para sobreposicao em fundos escuros.
  Todos os elementos: #ffffff

  USO: fundo transparente, simbolo branco (#ffffff) — fundos escuros (preto, ouro, foto)
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 100 100"
     width="100" height="100"
     role="img"
     aria-label="O Guardiao Sobrio — Simbolo Escudo (branco)">

  <path
    fill-rule="evenodd"
    fill="#ffffff"
    stroke="none"
    d="
      M 26,8 L 74,8 Q 77,8 77,11 L 77,48 L 50,92 L 23,48 L 23,11 Q 23,8 26,8 Z
      M 31,14 L 69,14 Q 71,14 71,16 L 71,46 L 50,81 L 29,46 L 29,16 Q 29,14 31,14 Z
    "
  />

  <circle
    cx="50" cy="30" r="16"
    fill="none"
    stroke="#ffffff"
    stroke-width="2"
  />

  <line
    x1="50" y1="14"
    x2="50" y2="46"
    stroke="#ffffff"
    stroke-width="1.5"
    stroke-linecap="square"
  />

</svg>
