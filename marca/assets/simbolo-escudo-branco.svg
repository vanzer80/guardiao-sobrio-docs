<?xml version="1.0" encoding="UTF-8"?>
<!--
  O Guardiao Sobrio — Simbolo Escudo v5 (versao branca / padrao)
  viewBox: 0 0 100 100

  NOTA: Esta e a versao PADRAO da marca (nao a ouro).
  Manual de marca: "Padrao (uso mais comum): Branco #E8E6E2 sobre escuro #0E0D0C."
  O ouro e a versao premium/destaque. O branco e o uso corriqueiro.

  Mesma geometria v5: proporcoes aureas, ogiva suave, cantos r=5.
  Fundo: transparente — para sobreposicao em qualquer fundo escuro da marca.
  Cor: #E8E6E2 (Texto Principal da marca — branco quente, nao branco puro).

  USO: fundo transparente, escudo #E8E6E2 — sobre fundos escuros (#0E0D0C, fotos noir)
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 100 100"
     width="100" height="100"
     role="img"
     aria-label="O Guardiao Sobrio — Simbolo Escudo (branco)">

  <!-- Sem fundo — transparente por design -->

  <path
    d="M 27,5 L 73,5 Q 78,5 78,10 L 78,61 C 78,73 60,93 50,95 C 40,93 22,73 22,61 L 22,10 Q 22,5 27,5 Z"
    fill="#E8E6E2"
    stroke="none"
  />

</svg>
