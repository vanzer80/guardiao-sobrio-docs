<?xml version="1.0" encoding="UTF-8"?>
<!--
  O Guardião Sóbrio — Capa Destaque Instagram: DEPOIMENTOS
  ==========================================================
  Dimensões: 1000 × 1000 px (exibido como círculo pelo Instagram)
  Cor do pilar: Prata Espelho #D4D0CA (pilar ESPELHO — identidade, consciência, verdade)

  Exportar como PNG 1000×1000 antes de subir como capa do Destaque.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1000 1000"
     width="1000" height="1000"
     role="img"
     aria-label="Destaque Instagram — Depoimentos">

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&amp;family=Cormorant+Garamond:ital@1&amp;display=swap');
    </style>
  </defs>

  <!-- Fundo -->
  <rect width="1000" height="1000" fill="#0E0D0C"/>

  <!-- Aspas decorativas (símbolo de depoimento) — acima do escudo -->
  <text x="500" y="230"
        font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-size="200"
        fill="#D4D0CA"
        text-anchor="middle"
        opacity="0.18">"</text>

  <!--
    Escudo — símbolo da marca
    Cor: Prata Espelho (pilar ESPELHO)
    Tamanho: 300×300 px (ligeiramente menor pois há texto decorativo acima)
    x = 500 - 150 = 350 | y = 210
  -->
  <svg x="350" y="210" width="300" height="300" viewBox="0 0 100 100" overflow="visible">
    <path
      d="M 27,5 L 73,5 Q 78,5 78,10 L 78,61 C 78,73 60,93 50,95 C 40,93 22,73 22,61 L 22,10 Q 22,5 27,5 Z"
      fill="#D4D0CA"
      stroke="none"
    />
  </svg>

  <!-- Título do destaque — pilar ESPELHO -->
  <text x="500" y="636"
        font-family="'Oswald', 'Arial Narrow', Impact, sans-serif"
        font-weight="700"
        font-size="72"
        fill="#D4D0CA"
        text-anchor="middle"
        letter-spacing="4">DEPOIMENTOS</text>

  <!-- Subtítulo -->
  <text x="500" y="706"
        font-family="'Oswald', 'Arial Narrow', sans-serif"
        font-weight="400"
        font-size="28"
        fill="#8A8782"
        text-anchor="middle"
        letter-spacing="3">HISTÓRIAS REAIS</text>

</svg>
