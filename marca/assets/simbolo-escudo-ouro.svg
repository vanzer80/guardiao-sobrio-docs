<?xml version="1.0" encoding="UTF-8"?>
<!--
  O Guardiao Sobrio — Simbolo Escudo v4 (versao ouro / principal)
  viewBox: 0 0 100 100

  MUDANCA v3 → v4: bottom arredondado
  As duas diagonais retas + ponta (L 77,50 L 50,92 L 23,50) foram substituidas por
  dois arcos cubicos simetricos que partem verticais na cintura e se encontram
  em uma base suave — sem ponta, sem angulo abrupto.

  GEOMETRIA DOS BEZIERS (externo):
    C 77,74  62,88  50,90   ← sai vertical de (77,50), curva para o centro, chega em (50,90)
    C 38,88  23,74  23,50   ← simetrico: sai de (50,90) e fecha em (23,50)

  GEOMETRIA DOS BEZIERS (interno, ~6u de offset perpendicular):
    C 71,67  59,82  50,84   ← mesmo comportamento, 6u mais interno
    C 41,82  29,67  29,47   ← simetrico

  Espessura da borda ~6u uniforme: verificada nos tres pontos criticos:
    - Topo:     y=14 − y=8  = 6u  ✓
    - Lados:    x=71 − x=77 = 6u  ✓
    - Fundo:    y=90 − y=84 = 6u  ✓ (perpendicular no ponto central x=50)

  ELEMENTOS:
  1. Moldura do escudo (frame evenodd): borda 6u, cantos sup r=3/r=2
  2. Anel: cx=50, cy=30, r=16 — inscrito no espaco retangular interno 42×33u
  3. Eixo vertical: x=50, de y=14 a y=46 — passa pelo centro do anel

  USO: fundo preto (#0a0a0a), simbolo ouro fosco (#c8a84b)
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 100 100"
     width="100" height="100"
     role="img"
     aria-label="O Guardiao Sobrio — Simbolo Escudo">

  <!-- Fundo preto -->
  <rect width="100" height="100" fill="#0a0a0a"/>

  <!-- MOLDURA DO ESCUDO (evenodd: externo preenchido, interno recortado) -->
  <path
    fill-rule="evenodd"
    fill="#c8a84b"
    stroke="none"
    d="
      M 26,8 L 74,8
      Q 77,8 77,11
      L 77,50
      C 77,74 62,88 50,90
      C 38,88 23,74 23,50
      L 23,11
      Q 23,8 26,8 Z

      M 31,14 L 69,14
      Q 71,14 71,16
      L 71,47
      C 71,67 59,82 50,84
      C 41,82 29,67 29,47
      L 29,16
      Q 29,14 31,14 Z
    "
  />

  <!-- ANEL — ciclo das 24h -->
  <circle
    cx="50" cy="30" r="16"
    fill="none"
    stroke="#c8a84b"
    stroke-width="2"
  />

  <!-- EIXO VERTICAL — foco do guardian -->
  <line
    x1="50" y1="14"
    x2="50" y2="46"
    stroke="#c8a84b"
    stroke-width="1.5"
    stroke-linecap="square"
  />

</svg>
