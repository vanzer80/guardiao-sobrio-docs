<?xml version="1.0" encoding="UTF-8"?>
<!--
  O Guardiao Sobrio — Simbolo Escudo v5 (versao ouro / principal)
  viewBox: 0 0 100 100

  ═══════════════════════════════════════════════════════
  ESTUDO DE MARCA — DECISOES DE DESIGN
  ═══════════════════════════════════════════════════════

  CONCEITO CENTRAL: "Perimetro e construcao"
  O metodo O Guardiao Sobrio e construido sobre o conceito de PERIMETRO:
  "Sem fronteiras, tudo invade." / "Meu 'nao' respeita meu 'sim'."
  O escudo NAO e um simbolo de ataque — e a linha que define o espaco seguro.
  Por isso: forma pura, sem ornamentos, sem elementos internos.
  O PERIMETRO E A MENSAGEM. A borda do escudo IS o escudo.

  POR QUE FORMA PURA (sem elementos internos):
  Versoes anteriores usaram circulo + linha vertical (remetia a mira/sniper —
  referencia militar/violencia, explicitamente proibida pelo manual de marca).
  O manual diz: "Guarda — nao ataca. Solidez — nao agressividade."
  Qualquer elemento interno que lembre reticulo, mira ou alvo vai contra isso.

  POR QUE ESTAS PROPORCOES — RAZAO AUREA:
  Secao retangular superior: 56u largura x 56u altura = QUADRADO PERFEITO.
  O quadrado como ancora de estabilidade — "a identidade sobria nasce da
  repeticao, nao da intensidade." Construcao regular, dia a dia.
  Total: largura 56u / altura 90u = 0,622 ≈ 1/φ (razao aurea inversa).
  A proporcao do escudo e matematicamente harmonica sem que ninguem precise saber.

  POR QUE OGIVA (base curva em ponta suave):
  O manual especifica: "base em ogiva ou ponta suave."
  Ogiva = arco apontado da arquitetura gotica — estrutura que resiste ao peso
  distribuindo-o para os lados. Metafora: o guardian distribui o peso da
  sobriedade pelo perimetro, nao o carrega sozinho no centro.
  Dois arcos convexos simetricos (Q 78,82 e Q 22,82) encontram-se em ponta
  suave (~50 graus de abertura): firme sem ser agressivo.

  POR QUE OS CANTOS SUPERIORES SAO ARREDONDADOS E OS INFERIORES NAO:
  O topo arredondado e abertura, acolhimento, entrada.
  A base pontiaguda e direcao, proposito, determinacao.
  A combinacao: marca que recebe com abertura e aponta para frente.

  CORRECOES DE PALETA (erros de versoes anteriores):
  · Fundo: #0E0D0C (Fundo Principal da marca) — NAO #0a0a0a
  · Ouro: #C8A84B (Ouro Fosco) — correto em todas as versoes
  · Branco: #E8E6E2 (Texto Principal, branco quente) — NAO #ffffff puro
  · Escuro: #1A1917 (Fundo Terciario) — para uso sobre fundos claros

  ═══════════════════════════════════════════════════════
  GEOMETRIA DO CAMINHO
  ═══════════════════════════════════════════════════════

  Largura:            x=22 a x=78  (56 unidades)
  Altura total:       y=5  a y=95  (90 unidades)
  Proporcao:          56/90 ≈ 1/φ  (razao aurea)

  Secao retangular:   y=5 a y=61   (56u = largura = quadrado perfeito)
  Secao ogiva:        y=61 a y=95  (34u ≈ 56/φ)

  Cantos superiores:  raio 5u (Q 78,5 78,10 / Q 22,5 27,5)
  Ogiva direita:      Q 78,82 50,95  — saida vertical, arco convexo, ponta suave
  Ogiva esquerda:     Q 22,82 22,61  — simetrica, encontra a direita em (50,95)
  Angulo da ponta:    ~50 graus (firme, nao agressivo)

  USO: fundo #0E0D0C (Fundo Principal da marca), escudo #C8A84B (Ouro Fosco)
  Leitura perfeita de 30px (icone de app) a 400px+ (hero / branding)
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 100 100"
     width="100" height="100"
     role="img"
     aria-label="O Guardiao Sobrio — Simbolo Escudo">

  <!-- Fundo — cor exata da marca: Fundo Principal #0E0D0C -->
  <rect width="100" height="100" fill="#0E0D0C"/>

  <!--
    ESCUDO — forma unica, preenchimento solido, zero elementos internos.

    M 27,5           inicio (5u a direita do canto superior esquerdo)
    L 73,5           topo reto
    Q 78,5 78,10     canto superior direito arredondado (r=5)
    L 78,61          lado direito reto (secao retangular: 56u = quadrado)
    Q 78,82 50,95    ogiva direita: saida vertical, arco convexo para ponta suave
    Q 22,82 22,61    ogiva esquerda: simetrica, fecha em ombro esquerdo
    L 22,10          lado esquerdo reto
    Q 22,5 27,5      canto superior esquerdo arredondado (r=5)
    Z                fecha
  -->
  <path
    d="M 27,5 L 73,5 Q 78,5 78,10 L 78,61 Q 78,82 50,95 Q 22,82 22,61 L 22,10 Q 22,5 27,5 Z"
    fill="#C8A84B"
    stroke="none"
  />

</svg>
