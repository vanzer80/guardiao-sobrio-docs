<?xml version="1.0" encoding="UTF-8"?>
<!--
  O Guardiao Sobrio — Simbolo Escudo (versao ouro / principal)
  viewBox: 0 0 100 100

  CONCEITO: "O Guardian que observa com precisao"
  Tres elementos no mesmo eixo X=50 (simetria perfeita):

  1. MOLDURA DO ESCUDO (frame evenodd)
     Borda dourada de ~6u, forma externa esbelta (ratio ~54:84, quase 2:3).
     Cantos superiores r=3 (externo) e r=2 (interno) — modernidade sem suavidade excessiva.
     Cintura em y=48, ponta em y=92 — taper mais longo que a secao reta.

  2. ANEL (circulo perfeito inscrito no espaco negativo interno)
     Raio 16u, centro (50, 30).
     O circulo TANGENCIA a borda superior interna (y=14) e a borda da cintura (y=46):
     matematicamente inscrito no espaco retangular — relacao de precisao geometrica.
     Simbolo: o ciclo das 24h (janela de sobriedade), completude, renovacao diaria.

  3. EIXO VERTICAL (linha de foco)
     De y=14 (borda interna superior) ate y=46 (cintura interna).
     Passa exatamente pelo centro do anel (50, 30).
     Simbolo: direcao, foco, o guardiao que aponta para o proximo passo.

  Os tres elementos criam a leitura de um visor/reticulo — precisao e vigilancia do guardian.

  USO: fundo preto (#0a0a0a), simbolo ouro fosco (#c8a84b)
  Funciona em 30px (app icon) e 400px+ (hero / branding)
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 100 100"
     width="100" height="100"
     role="img"
     aria-label="O Guardiao Sobrio — Simbolo Escudo">

  <!-- Fundo preto -->
  <rect width="100" height="100" fill="#0a0a0a"/>

  <!--
    ELEMENTO 1: MOLDURA DO ESCUDO
    Dois subcaminhos com fill-rule="evenodd":
    Externo: M 26,8 → cantos r=3 → cintura (77,48) → ponta (50,92) → fecha
    Interno:  M 31,14 → cantos r=2 → cintura interna (71,46) → ponta interna (50,81) → fecha
    Espessura da borda: ~6u em todos os lados (calculado por offset perpendicular)
  -->
  <path
    fill-rule="evenodd"
    fill="#c8a84b"
    stroke="none"
    d="
      M 26,8 L 74,8 Q 77,8 77,11 L 77,48 L 50,92 L 23,48 L 23,11 Q 23,8 26,8 Z
      M 31,14 L 69,14 Q 71,14 71,16 L 71,46 L 50,81 L 29,46 L 29,16 Q 29,14 31,14 Z
    "
  />

  <!--
    ELEMENTO 2: ANEL — ciclo das 24h
    cx=50, cy=30, r=16
    Tangencia: topo em y=14 (borda interna superior), base em y=46 (cintura interna)
    Matematicamente inscrito no retangulo 42x32u do espaco negativo
  -->
  <circle
    cx="50" cy="30" r="16"
    fill="none"
    stroke="#c8a84b"
    stroke-width="2"
  />

  <!--
    ELEMENTO 3: EIXO VERTICAL — linha de foco do guardian
    De borda interna superior (y=14) ate cintura interna (y=46)
    Passa pelo centro exato do anel (50, 30)
    Ligeiramente mais fino que o anel para nao dominar
  -->
  <line
    x1="50" y1="14"
    x2="50" y2="46"
    stroke="#c8a84b"
    stroke-width="1.5"
    stroke-linecap="square"
  />

</svg>
